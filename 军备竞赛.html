<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 边狱巴士 · 军备竞赛</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
 background: #0a0f1a;
 color: #e2e8f0;
 min-height: 100vh;
}
.header {
 background: linear-gradient(135deg, #1e1b4b, #0f172a);
 border-bottom: 1px solid #1e293b;
 padding: 16px 20px;
 text-align: center;
}
.header h1 {
 font-size: 22px;
 font-weight: 800;
 background: linear-gradient(135deg, #f59e0b, #f472b6);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
}
.header .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 12px 16px; }
.section {
 background: #141b2d;
 border: 1px solid #1e293b;
 border-radius: 14px;
 padding: 16px;
 margin-bottom: 12px;
}
.section-title {
 font-size: 15px;
 font-weight: 700;
 margin-bottom: 10px;
 color: #e2e8f0;
}
.btn {
 padding: 9px 20px;
 border: none;
 border-radius: 10px;
 font-family: inherit;
 font-size: 14px;
 font-weight: 600;
 cursor: pointer;
 transition: all 0.15s;
}
.btn:hover { filter: brightness(1.15); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
.btn-primary { background: linear-gradient(135deg,#f59e0b,#d97706); color: #000; }
.btn-success { background: linear-gradient(135deg,#22c55e,#16a34a); color: #fff; }
.btn-danger { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff; }
.btn-warning { background: linear-gradient(135deg,#eab308,#ca8a04); color: #000; }
.btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }

.game-phase { display: none; }
.game-phase.active { display: block; }

.game-tabs {
 display: flex;
 gap: 8px;
 margin-bottom: 12px;
 flex-wrap: wrap;
}
.game-tab {
 padding: 8px 16px;
 border-radius: 8px;
 font-size: 13px;
 font-weight: 600;
 cursor: pointer;
 border: 1px solid #1e293b;
 background: #0f172a;
 color: #64748b;
}
.game-tab.active { background: #1e3a5f; border-color: #f59e0b; color: #e2e8f0; }
.game-tab.played { background: #141b2d; color: #22c55e; border-color: #22c55e; }

.step-bar {
 display: flex;
 gap: 4px;
 margin-bottom: 14px;
 flex-wrap: wrap;
 justify-content: center;
}
.step {
 padding: 5px 12px;
 border-radius: 6px;
 font-size: 12px;
 background: #0f172a;
 color: #64748b;
 border: 1px solid #1e293b;
}
.step.done { background: #1a3a2a; color: #22c55e; border-color: #22c55e; }
.step.current { background: #1e3a5f; color: #f59e0b; border-color: #f59e0b; }

.battle-setup {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 16px;
 align-items: start;
}
@media (max-width: 900px) { .battle-setup { grid-template-columns: 1fr; } }

.player-panel {
 background: #0f172a;
 border: 1px solid #1e293b;
 border-radius: 10px;
 padding: 14px;
}
.player-panel .pp-header {
 display: flex;
 flex-direction: column;
 gap: 4px;
 margin-bottom: 8px;
 padding-bottom: 8px;
 border-bottom: 1px solid #1e293b;
}
.player-panel .pp-top {
 display: flex;
 align-items: center;
 gap: 8px;
 flex-wrap: wrap;
}
.player-panel .pp-name { font-size: 15px; font-weight: 700; }
.player-panel .pp-faction { font-size: 13px; color: #f59e0b; margin-top: 2px; }
.player-panel .pp-tier { font-size: 12px; }
.player-panel .pp-finger { font-size: 12px; color: #f472b6; margin-top: 2px; }
.pp-body { min-height: 80px; }

/* Draw */
.draw-area {
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 16px;
 padding: 20px 0;
}
.draw-card {
 background: #0f172a;
 border: 1px solid #1e293b;
 border-radius: 12px;
 padding: 16px;
 min-width: 260px;
 text-align: center;
}
.draw-card .dc-faction {
 font-size: 18px;
 font-weight: 700;
 margin: 6px 0;
}
.draw-card .dc-tier { font-size: 13px; color: #64748b; }
.draw-card .dc-count { font-size: 12px; color: #64748b; }
.draw-card.reroll-avail { border-color: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.12); }

.draw-grid {
 display: grid;
 grid-template-columns: 1fr auto 1fr;
 gap: 14px;
 align-items: center;
 width: 100%;
 max-width: 800px;
}
@media (max-width: 700px) { .draw-grid { grid-template-columns: 1fr; } }

/* Pick */
.side-pick-area {
 display: flex;
 flex-wrap: wrap;
 gap: 8px;
 min-height: 50px;
}
.pick-slot {
 width: 100%;
 min-height: 44px;
 border-radius: 8px;
 border: 2px dashed #334155;
 display: flex;
 align-items: center;
 padding: 6px 12px;
 font-size: 13px;
 color: #64748b;
 position: relative;
}
.pick-slot.filled {
 border-style: solid;
 border-color: #22c55e;
 background: rgba(34,197,94,0.1);
 color: #e2e8f0;
 cursor: pointer;
}
.pick-slot.filled .remove {
 position: absolute;
 top: -6px;
 right: -6px;
 width: 18px;
 height: 18px;
 border-radius: 50%;
 background: #ef4444;
 color: #fff;
 font-size: 10px;
 display: flex;
 align-items: center;
 justify-content: center;
 cursor: pointer;
}
.pick-slot .pick-id { font-size: 11px; color: #64748b; margin-right: 8px; flex-shrink: 0; }
.pick-slot .pick-name { flex: 1; }
.pick-slot .pick-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }

.char-list {
 display: flex;
 flex-direction: column;
 gap: 4px;
 max-height: 300px;
 overflow-y: auto;
 margin-top: 8px;
}
.char-item {
 display: flex;
 align-items: center;
 gap: 8px;
 padding: 6px 10px;
 border-radius: 6px;
 background: rgba(255,255,255,0.03);
 border: 1px solid transparent;
 cursor: pointer;
 transition: all 0.12s;
 font-size: 13px;
}
.char-item:hover { border-color: #334155; background: rgba(255,255,255,0.06); }
.char-item.selected {
 border-color: #22c55e;
 background: rgba(34,197,94,0.08);
 opacity: 0.5;
 cursor: default;
}
.char-item .ci-id { font-size: 11px; color: #64748b; width: 50px; flex-shrink: 0; font-family: monospace; }
.char-item .ci-name { flex: 1; }
.char-item .ci-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
.tag-finger-tag { background: #f472b6; color: #000; font-size: 10px; padding: 1px 6px; border-radius: 4px; }

/* Dice */
.dice-area {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 20px;
 padding: 20px 0;
 flex-wrap: wrap;
}
.dice-box {
 width: 64px;
 height: 64px;
 border-radius: 12px;
 background: #1e293b;
 border: 2px solid #334155;
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 32px;
 font-weight: 800;
}
.dice-box.winner { border-color: #22c55e; background: rgba(34,197,94,0.15); }
.dice-label { font-size: 12px; color: #64748b; text-align: center; margin-bottom: 4px; }

.status-area {
 text-align: center;
 padding: 12px 8px;
 font-size: 14px;
 color: #94a3b8;
 margin-top: 8px;
}
.status-area .highlight { color: #f59e0b; font-weight: 600; }

/* Score */
.score-bar {
 display: flex;
 justify-content: center;
 gap: 20px;
 padding: 8px 0;
 align-items: center;
}
.score-box {
 text-align: center;
 padding: 6px 18px;
 border-radius: 8px;
 background: #0f172a;
 border: 1px solid #1e293b;
 min-width: 80px;
}
.score-box .sb-label { font-size: 12px; color: #64748b; }
.score-box .sb-val { font-size: 24px; font-weight: 800; }
.score-box .sb-tier { font-size: 12px; margin-top: 2px; }
.score-box .sb-divider { font-size: 20px; font-weight: 700; color: #475569; }

/* Tier/Reroll badges */
.tier-badge {
 display: inline-block;
 padding: 2px 8px;
 border-radius: 4px;
 font-size: 11px;
 font-weight: 600;
}
.tier-2 { background: #7c3aed; color: #fff; }
.tier-1 { background: #eab308; color: #000; }
.tier-0 { background: #ef4444; color: #fff; }
.reroll-badge {
 display: inline-block;
 padding: 2px 8px;
 border-radius: 4px;
 font-size: 11px;
 font-weight: 600;
 background: rgba(245,158,11,0.2);
 color: #f59e0b;
 border: 1px solid rgba(245,158,11,0.4);
}
.reroll-used {
 background: #334155;
 color: #64748b;
 border-color: transparent;
}

/* Finger inventory */
.finger-inv {
 display: flex;
 gap: 6px;
 flex-wrap: wrap;
 margin: 6px 0;
}
.finger-chip {
 display: inline-flex;
 align-items: center;
 gap: 4px;
 padding: 4px 12px;
 border-radius: 14px;
 background: rgba(244,114,182,0.15);
 border: 1px solid rgba(244,114,182,0.4);
 font-size: 12px;
 cursor: pointer;
 transition: all 0.12s;
}
.finger-chip:hover { background: rgba(244,114,182,0.3); }
.finger-chip.used { opacity: 0.35; cursor: default; }

/* Final lineup */
.final-grid {
 display: flex;
 flex-wrap: wrap;
 gap: 8px;
 justify-content: center;
}
.final-card {
 padding: 8px 14px;
 border-radius: 8px;
 background: rgba(34,197,94,0.08);
 border: 1px solid #22c55e;
 font-size: 13px;
}
.final-card .fc-id { font-size: 11px; color: #64748b; margin-right: 6px; }
.final-card.finger-card { border-color: #f472b6; background: rgba(244,114,182,0.1); }

.toast {
 position: fixed;
 bottom: 24px; left: 50%;
 transform: translateX(-50%) translateY(80px);
 background: #141b2d;
 border: 1px solid #1e293b;
 border-radius: 10px;
 padding: 10px 18px;
 font-size: 14px;
 box-shadow: 0 8px 32px rgba(0,0,0,0.5);
 opacity: 0;
 transition: all 0.3s ease;
 z-index: 200;
 pointer-events: none;
 white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

</div>

<div class="container">

 </div>

</div>

<!-- DRAW -->

 <div class="draw-grid" id="drawGrid" style="display:none;">
 <div id="drawCardA"></div>

 <div id="drawCardB"></div>
 </div>
 <div id="drawActions" style="display:none;"></div>
 </div>
</div>

<!-- GAME -->
<div class="section game-phase" id="gameSection">
 <div class="section-title">⚔️ 第2步 · BO5对战</div>

 <div class="game-tabs" id="gameTabs">
 <div class="game-tab" data-g="0" onclick="switchGame(0)">第1场</div>
 <div class="game-tab" data-g="1" onclick="switchGame(1)">第2场</div>
 <div class="game-tab" data-g="2" onclick="switchGame(2)">第3场</div>
 <div class="game-tab" data-g="3" onclick="switchGame(3)">第4场</div>
 <div class="game-tab" data-g="4" onclick="switchGame(4)">第5场</div>
 </div>

 <div class="step-bar" id="stepBar"></div>

 <!-- Dice area -->
 <div class="dice-area" id="diceArea" style="display:none;">
 <div><div class="dice-label">🔵 蓝方</div><div class="dice-box" id="diceA">-</div></div>
 <button class="btn btn-warning" onclick="rollDice()" id="diceBtn">🎲 掷骰子</button>
 <div><div class="dice-label">🔴 红方</div><div class="dice-box" id="diceB">-</div></div>
 </div>
 <div id="diceResult" style="display:none;text-align:center;margin-bottom:12px;"></div>
 <div id="diceNextBtn" style="display:none;text-align:center;margin-bottom:12px;"></div>

 <!-- Player panels -->
 <div class="battle-setup" id="panelsArea" style="display:none;">
 <div class="player-panel" id="panelA" style="border-color:#1e3a5f;">
 <div class="pp-header" style="border-color:#1e3a5f;">
 <div class="pp-top"><span class="pp-name" style="color:#818cf8;">🔵 蓝方</span><span id="badgeTierA"></span><span id="badgeRerollA"></span></div>
 <span class="pp-faction" id="factionA">-</span>
 <span class="pp-finger" id="fingerInvA"></span>
 </div>
 <div class="pp-body" id="bodyA"></div>
 </div>
 <div class="player-panel" id="panelB" style="border-color:#3b1f3b;">
 <div class="pp-header" style="border-color:#3b1f3b;">
 <div class="pp-top"><span class="pp-name" style="color:#f472b6;">🔴 红方</span><span id="badgeTierB"></span><span id="badgeRerollB"></span></div>
 <span class="pp-faction" id="factionB">-</span>
 <span class="pp-finger" id="fingerInvB"></span>
 </div>
 <div class="pp-body" id="bodyB"></div>
 </div>
 </div>

 <div class="status-area" id="statusArea"></div>
</div>

</div>
<div class="toast" id="toast"></div>

 11203:'格里高尔 G公司科长代理',11206:'格里高尔 二协会南部4科',

 11215:'格里高尔 LCE_E.G.O:AEDD'
};

const FACTIONS = {
 下等: [
 {name:'脑叶E.G.O·狂', ids:[10514,10705,11107,11214]},
 {name:'二·四·十一协', ids:[10213,10708,10810,11206]},
 {name:'黑云会', ids:[10403,10712,10811,10902]},
 {name:'流浪者', ids:[10404,10603,10609,11213]},
 ],
 中等: [
 {name:'散件事务所', ids:[10210,10807,10813,11009,11105,11211]},
 {name:'R公司', ids:[10506,10612,10703,10802,10914]},
 {name:'黑兽·部众', ids:[10313,10411,10912,11014,11112,11212]},
 {name:'LCE·LCA·技术解放', ids:[10104,10211,11114,11215]},
 {name:'剑契组', ids:[10103,10208,10508,11002,10815]},
 {name:'六·十协会', ids:[10112,10806,10908,10510,10608,10907]},
 {name:'七·九协会', ids:[10206,11104,10910,11011]},
 {name:'山庄队', ids:[10408,11209,10710,11108]},
 {name:'拉·曼却', ids:[10310,10513,10911,11111,11210]},
 {name:'被割舍者', ids:[10214,10306,11012,10814,10716,11013,10109,10515]},
 {name:'W公司', ids:[10106,10302,10405,10503,10713,11110]},
 {name:'N公司·执柄者', ids:[10113,10412,10504,10204,11005]},
 {name:'T·K·S·G公司', ids:[10309,11113,10605,10615,11203]},
 {name:'五协会', ids:[10305,10311,10511,11008]},
 ],
 上等: [
 {name:'鸿园护院者', ids:[10114,10212,10714,10413,10613,10812]},
 {name:'脑叶E.G.O·悲', ids:[10110,10207,10312,10410,10414,10913]},
 {name:'句点·裴廓德号', ids:[10611,10711,10707,10808]},
 ],
};
const FINGER_DATA = [
 {name:'食指', ids:[10115,10314]},
 {name:'中指', ids:[10715,11115]},
 {name:'拇指', ids:[10512,10916]},
 {name:'小指', ids:[10415,11015]},
 {name:'环指', ids:[10215,10614,10915]},
];
const FINGER_NAMES = ['食指','中指','拇指','小指','环指'];
const TIERS = ['下等','中等','上等'];

function shortName(id){ return P[id]?P[id].split(' ')[1]:'?'+id; }
function fullName(id){ return P[id]||'?'+id; }

// ═══════════ STATE ═══════════
let G = {
 A: { tier:0, fingers:[], reroll:true, faction:null, picked:[], fingerActive:false, fingerFaction:null, fingerId:null },
 B: { tier:0, fingers:[], reroll:true, faction:null, picked:[], fingerActive:false, fingerFaction:null, fingerId:null },
 scores:[0,0], curGame:0,
 step:'draw', firstPicker:null, pickPhase:'', // 'A_first','B_second','done'
};

var tt;
function toast(m){
 var el=document.getElementById('toast');
 el.textContent=m; el.className='toast show';
 clearTimeout(tt);
 tt=setTimeout(function(){el.className='toast';},2500);
}

function rand(n){ return Math.floor(Math.random()*n); }
function pick(arr){ return arr[rand(arr.length)]; }

// ═══════════ START ═══════════
function startMatch(){
 G.A={tier:0,fingers:[],reroll:true,faction:null,picked:[],fingerActive:false,fingerFaction:null,fingerId:null};
 G.B={tier:0,fingers:[],reroll:true,faction:null,picked:[],fingerActive:false,fingerFaction:null,fingerId:null};
 G.scores=[0,0]; G.curGame=0; G.step='draw'; G.firstPicker=null; G.pickPhase='';

 document.getElementById('scoreSection').style.display='block';
 document.getElementById('gameSection').classList.add('active');
 document.getElementById('startBtn').textContent='🔄 重新开始';

 drawFactions();
 updateScore();
 updateTabs();
 render();
}

function drawFactions(){
 G.A.faction=pick(FACTIONS[TIERS[G.A.tier]]);
 G.B.faction=pick(FACTIONS[TIERS[G.B.tier]]);
 G.A.picked=[];
 G.B.picked=[];
 G.A.fingerActive=false; G.A.fingerId=null;
 G.B.fingerActive=false; G.B.fingerId=null;
 G.step='draw';
 G.pickPhase='';
}

// ═══════════ DRAW ═══════════
function renderDraw(){
 document.getElementById('diceArea').style.display='none';
 document.getElementById('diceResult').style.display='none';
 document.getElementById('diceNextBtn').style.display='none';
 document.getElementById('panelsArea').style.display='none';

 var g=document.getElementById('drawGrid'); g.style.display='grid';
 var a=document.getElementById('drawActions'); a.style.display='block';

 var pA=G.A,pB=G.B;
 document.getElementById('drawCardA').innerHTML=
 '<div class="draw-card'+(pA.reroll?' reroll-avail':'')+'">'+
 '<div style="color:#818cf8;font-weight:700;">🔵 蓝方</div>'+
 '<div class="dc-tier">'+TIERS[pA.tier]+'</div>'+
 '<div class="dc-faction">'+pA.faction.name+'</div>'+
 '<div class="dc-count">'+pA.faction.ids.length+'人</div>'+
 (pA.reroll?'<div style="margin-top:8px;"><button class="btn btn-warning" onclick="reroll(\'A\')" style="font-size:12px;padding:4px 12px;">🔄 换队</button></div>':'')+
 '</div>';

 document.getElementById('drawCardB').innerHTML=
 '<div class="draw-card'+(pB.reroll?' reroll-avail':'')+'">'+
 '<div style="color:#f472b6;font-weight:700;">🔴 红方</div>'+
 '<div class="dc-tier">'+TIERS[pB.tier]+'</div>'+
 '<div class="dc-faction">'+pB.faction.name+'</div>'+
 '<div class="dc-count">'+pB.faction.ids.length+'人</div>'+
 (pB.reroll?'<div style="margin-top:8px;"><button class="btn btn-warning" onclick="reroll(\'B\')" style="font-size:12px;padding:4px 12px;">🔄 换队</button></div>':'')+
 '</div>';

 a.innerHTML='<button class="btn btn-success" onclick="confirmDraw()">✅ 确认阵营</button>';
 document.getElementById('statusArea').innerHTML='🎯 可使用「换队」重新抽阵营（每方限1次）';
}

function reroll(side){
 var p=G[side];
 if(!p.reroll){toast('换队机会已用完');return;}
 p.reroll=false;
 p.faction=pick(FACTIONS[TIERS[p.tier]]);
 p.picked=[];
 render();
 toast((side==='A'?'蓝方':'红方')+' 换队 → '+p.faction.name);
}

function confirmDraw(){
 G.step='dice';
 render();
}

// ═══════════ DICE ═══════════
function renderDice(){
 document.getElementById('drawGrid').style.display='none';
 document.getElementById('drawActions').style.display='none';
 document.getElementById('panelsArea').style.display='none';
 document.getElementById('diceArea').style.display='flex';
 document.getElementById('diceBtn').style.display='';
 document.getElementById('diceResult').style.display='none';
 document.getElementById('diceNextBtn').style.display='none';
 document.getElementById('diceA').textContent='-';
 document.getElementById('diceB').textContent='-';
 document.getElementById('statusArea').innerHTML='🎲 点击「掷骰子」决定先手方';
}

function rollDice(){
 var dA,dB;
 do{dA=rand(6)+1;dB=rand(6)+1;}while(dA===dB);
 document.getElementById('diceA').textContent=dA;
 document.getElementById('diceB').textContent=dB;
 document.getElementById('diceA').className='dice-box'+(dA>dB?' winner':'');
 document.getElementById('diceB').className='dice-box'+(dB>dA?' winner':'');
 document.getElementById('diceResult').style.display='block';
 document.getElementById('diceBtn').style.display='none';
 G.firstPicker=dA<=dB?'A':'B';
 var fn=G.firstPicker==='A'?'🔵 蓝方':'🔴 红方';
 document.getElementById('diceResult').innerHTML='<div style="font-size:15px;font-weight:700;">➖ '+fn+' 先选人</div>';
 document.getElementById('diceNextBtn').innerHTML='<button class="btn btn-success" onclick="startPick()">✅ 开始选人</button>';
 document.getElementById('diceNextBtn').style.display='block';
}

function startPick(){
 G.pickPhase=G.firstPicker; // 'A' or 'B' starts
 G.step='pick';
 render();
}

// ═══════════ PICK ═══════════
function renderPick(){
 document.getElementById('diceArea').style.display='none';
 document.getElementById('diceResult').style.display='none';
 document.getElementById('diceNextBtn').style.display='none';
 document.getElementById('drawGrid').style.display='none';
 document.getElementById('drawActions').style.display='none';
 document.getElementById('panelsArea').style.display='grid';

 var pA=G.A,pB=G.B;
 document.getElementById('factionA').textContent=pA.faction.name;
 document.getElementById('factionB').textContent=pB.faction.name;
 document.getElementById('badgeTierA').innerHTML='<span class="tier-badge tier-'+pA.tier+'">'+TIERS[pA.tier]+'</span>';
 document.getElementById('badgeTierB').innerHTML='<span class="tier-badge tier-'+pB.tier+'">'+TIERS[pB.tier]+'</span>';
 document.getElementById('badgeRerollA').innerHTML=pA.reroll?'<span class="reroll-badge">🔄可换队</span>':'<span class="reroll-badge reroll-used">换队已用</span>';
 document.getElementById('badgeRerollB').innerHTML=pB.reroll?'<span class="reroll-badge">🔄可换队</span>':'<span class="reroll-badge reroll-used">换队已用</span>';

 renderFingerInv('A'); renderFingerInv('B');

 // Determine whose turn it is
 var turnA=false, turnB=false;
 var doneA=pA.picked.length>=4, doneB=pB.picked.length>=4;

 if(G.pickPhase==='A' && !doneA){ turnA=true; }
 else if(G.pickPhase==='A' && doneA && !doneB){ turnB=true; }
 else if(G.pickPhase==='B' && !doneB){ turnB=true; }
 else if(G.pickPhase==='B' && doneB && !doneA){ turnA=true; }

 renderPickPanel('A',turnA);
 renderPickPanel('B',turnB);

 // Actions
 if(doneA && doneB){
 document.getElementById('statusArea').innerHTML='<button class="btn btn-success" onclick="confirmBattle()">✅ 确认对决</button>';
 }else{
 var who=turnA?'🔵 蓝方':'🔴 红方';
 var cnt=turnA?pA.picked.length:pB.picked.length;
 document.getElementById('statusArea').innerHTML='✋ '+who+' 选人中（'+(cnt>0?cnt+'':'0')+'/4）<span style="color:#64748b;font-size:12px;margin-left:8px;">点击人物添加到队伍，已选人物可点击移除</span>';
 }
}

function renderPickPanel(side,active){
 var p=G[side];
 var panel=document.getElementById('body'+(side==='A'?'A':'B'));
 var fd=p.faction;

 // Current picks
 var html='<div style="display:flex;flex-direction:column;gap:6px;">';
 html+='<div style="font-size:12px;color:#64748b;margin-bottom:2px;">已选（'+(p.picked.length)+'/4）</div>';
 for(var i=0;i<4;i++){
 if(i<p.picked.length){
 var id=p.picked[i];
 var isFinger=(p.fingerActive && p.fingerId===id);
 html+='<div class="pick-slot filled">';
 // Finger slot cannot be removed; others can if active
 if(active && !isFinger) html+='<span class="remove" onclick="removePick(\''+side+'\','+i+')">×</span>';
 if(isFinger && active) html+='<span class="remove" style="background:#64748b;cursor:default;">🔒</span>';
 html+='<span class="pick-id">'+id+'</span>';
 html+='<span class="pick-name">'+fullName(id)+'</span>';
 if(isFinger) html+='<span class="pick-tag tag-finger-tag">☝️</span>';
 html+='</div>';
 }else{
 html+='<div class="pick-slot">'+(i+1)+'</div>';
 }
 }

 // Available characters
 if(active){
 // Check if finger can be used
 if(p.fingers.length>0 && !p.fingerActive){
 html+='<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">';
 html+='<span style="font-size:12px;color:#f472b6;width:100%;">☝️ 手指支援：</span>';
 for(var f of p.fingers){
 html+='<div class="finger-chip" onclick="useFinger(\''+side+'\',\''+f+'\')">'+f+'</div>';
 }
 html+='</div>';
 }else if(p.fingerActive){
 html+='<div style="margin:6px 0;padding:4px 10px;background:rgba(244,114,182,0.12);border-radius:6px;font-size:12px;color:#f472b6;">';
 html+='☝️ '+p.fingerFaction+' 已启用（固定占1个槽位，不可移除）</div>';
 }

 html+='<div style="font-size:12px;color:#64748b;margin:8px 0 4px;">点击添加人物到队伍：</div>';
 html+='<div class="char-list">';
 for(var id of fd.ids){
 if(p.picked.indexOf(id)>=0) continue;
 html+='<div class="char-item" onclick="addPick(\''+side+'\','+id+')">';
 html+='<span class="ci-id" onclick="event.stopPropagation();copyId('+id+');" title="点击复制ID" style="cursor:pointer;">'+id+'</span>';
 html+='<span class="ci-name">'+fullName(id)+'</span>';
 html+='</div>';
 }
 html+='</div>';
 }else{
 html+='<div style="font-size:12px;color:#64748b;padding:12px 0;">⏳ 等待对方选人...</div>';
 if(p.picked.length>0){
 html+='<div style="font-size:12px;color:#64748b;margin:6px 0 4px;">已选人物：</div>';
 for(var id of p.picked){
 html+='<div style="padding:4px 8px;font-size:12px;"><span style="color:#64748b;">'+id+'</span> '+fullName(id)+'</div>';
 }
 }
 if(p.fingerActive){
 html+='<div style="margin-top:4px;font-size:12px;color:#f472b6;">☝️ 手指支援已启用</div>';
 }
 }

 html+='</div>';
 panel.innerHTML=html;
}

function addPick(side,id){
 var p=G[side];
 if(p.picked.length>=4) return;
 p.picked.push(id);
 render();
}

function removePick(side,idx){
 var p=G[side];
 if(idx<p.picked.length) p.picked.splice(idx,1);
 render();
}

function useFinger(side,fingerName){
 var p=G[side];
 if(p.fingerActive){toast('已启用手指支援');return;}
 var fd=null;
 for(var f of FINGER_DATA){if(f.name===fingerName){fd=f;break;}}
 if(!fd) return;
 var idx=p.fingers.indexOf(fingerName);
 if(idx>=0) p.fingers.splice(idx,1);
 p.fingerActive=true;
 p.fingerFaction=fingerName;
 p.fingerId=pick(fd.ids);
 p.picked.push(p.fingerId);
 render();
 toast((side==='A'?'蓝方':'红方')+' 启用 ☝️'+fingerName);
}

function renderFingerInv(side){
 var p=G[side];
 var el=document.getElementById('fingerInv'+(side==='A'?'A':'B'));
 if(p.fingers.length>0){
 el.innerHTML='☝️ 持有：<span style="color:#f472b6;">'+p.fingers.join(' · ')+'</span>';
 }else{
 el.innerHTML='';
 }
}

function confirmBattle(){
 if(G.A.picked.length<4||G.B.picked.length<4){toast('⚠️ 双方都要选满4人');return;}
 G.step='done';
 render();
}

// ═══════════ DONE ═══════════
function renderDone(){
 document.getElementById('panelsArea').style.display='grid';

 var pA=G.A,pB=G.B;
 document.getElementById('factionA').textContent=pA.faction.name;
 document.getElementById('factionB').textContent=pB.faction.name;

 var show=[['A',pA],['B',pB]];
 for(var s of show){
 var side=s[0],p=s[1];
 var body=document.getElementById('body'+(side==='A'?'A':'B'));
 var html='<div style="font-size:14px;font-weight:600;color:#22c55e;margin-bottom:8px;">✅ 最终阵容</div>';
 html+='<div class="final-grid">';
 for(var id of p.picked){
 var isFinger=(p.fingerActive && p.fingerId===id);
 html+='<div class="final-card'+(isFinger?' finger-card':'')+'">';
 html+='<span class="fc-id" onclick="copyId('+id+')" title="点击复制ID" style="cursor:pointer;">'+id+'</span>';
 html+=fullName(id);
 if(isFinger) html+=' ☝️';
 html+='</div>';
 }
 html+='</div>';
 body.innerHTML=html;
 }

 renderFingerInv('A');renderFingerInv('B');

 document.getElementById('statusArea').innerHTML=
 '<div style="display:flex;gap:12px;justify-content:center;">'+
 '<button class="btn btn-success" onclick="recordWin(\'A\')">🏆 蓝方胜</button>'+
 '<button class="btn btn-danger" onclick="recordWin(\'B\')">🏆 红方胜</button></div>';
}

// ═══════════ WIN ═══════════
function recordWin(side){
 var idx=(side==='A'?0:1);
 G.scores[idx]++;

 var loser=(side==='A'?'B':'A');
 var p=G[loser];
 var avail=FINGER_NAMES.filter(function(f){return p.fingers.indexOf(f)<0;});
 if(avail.length>0){
 var nf=avail[rand(avail.length)];
 p.fingers.push(nf);
 toast((loser==='A'?'蓝方':'红方')+' 获得 ☝️'+nf);
 }

 var winner=G[side];
 if(winner.tier<2) winner.tier++;

 updateScore(); updateTabs();

 if(G.scores[0]>=3||G.scores[1]>=3){
 var wn=G.scores[0]>=3?'🔵 蓝方':'🔴 红方';
 toast('🏆 '+wn+' 赢得军备竞赛！');
 document.getElementById('statusArea').innerHTML=
 '🏆 系列赛结束！'+wn+' 获胜！<br><br><button class="btn btn-primary" onclick="startMatch()">🔄 新系列赛</button>';
 return;
 }

 G.curGame++;
 if(G.curGame>4) return;
 drawFactions();
 updateTabs();
 switchGame(G.curGame);
}

// ═══════════ UI ═══════════
function switchGame(idx){
 if(idx<0||idx>4) return;
 if(idx>G.curGame) return;
 G.curGame=idx;
 updateTabs();
 render();
}

function updateScore(){
 document.getElementById('scoreA').textContent=G.scores[0];
 document.getElementById('scoreB').textContent=G.scores[1];
 document.getElementById('gameNum').textContent=G.curGame+1;
 document.getElementById('tierLabelA').textContent=TIERS[G.A.tier];
 document.getElementById('tierLabelB').textContent=TIERS[G.B.tier];
}

function updateTabs(){
 var tabs=document.querySelectorAll('.game-tab');
 tabs.forEach(function(t,i){
 t.classList.remove('active','played');
 if(i===G.curGame) t.classList.add('active');
 else if(i<G.curGame||(i<=G.curGame&&G.step==='done')) t.classList.add('played');
 });
}

function updateSteps(){
 var steps=['抽阵营','骰子','选人','开战'];
 var curIdx=0;
 if(G.step==='draw') curIdx=0;
 else if(G.step==='dice') curIdx=1;
 else if(G.step==='pick') curIdx=2;
 else if(G.step==='done') curIdx=3;
 var html='';
 for(var i=0;i<steps.length;i++){
 var cls='step';
 if(i<curIdx) cls+=' done';
 else if(i===curIdx) cls+=' current';
 html+='<div class="step '+cls+'">'+(i<curIdx?'✓':'')+steps[i]+'</div>';
 }
 document.getElementById('stepBar').innerHTML=html;
}

function render(){
 updateSteps(); updateScore();
 if(G.step==='draw') renderDraw();
 else if(G.step==='dice') renderDice();
 else if(G.step==='pick') renderPick();
 else if(G.step==='done') renderDone();
}

function copyId(id){
 var el=document.createElement('textarea');
 el.value=id;
 document.body.appendChild(el);
 el.select();
 document.execCommand('copy');
 document.body.removeChild(el);
 toast('📋 已复制 ID: '+id);
}
</script>
</body>
</html>
