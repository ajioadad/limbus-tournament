<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏟️ 边狱巴士 · 阵营赛</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
 background: #0a0f1a;
 color: #e2e8f0;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
}
.nav-bar {
 position: fixed;
 top: 0; left: 0; right: 0;
 padding: 12px 20px;
 background: #0f172a;
 border-bottom: 1px solid #1e293b;
 z-index: 100;
}
.nav-bar a {
 color: #64748b;
 text-decoration: none;
 font-size: 13px;
}
.nav-bar a:hover { color: #818cf8; }

.header {
 text-align: center;
 margin-bottom: 40px;
}
.header h1 {
 font-size: 28px;
 font-weight: 800;
 background: linear-gradient(135deg, #f59e0b, #818cf8);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
 margin-bottom: 8px;
}
.header .sub {
 font-size: 14px;
 color: #64748b;
}

.modes {
 display: flex;
 gap: 24px;
 flex-wrap: wrap;
 justify-content: center;
}
.mode-card {
 width: 300px;
 padding: 36px 28px;
 border-radius: 18px;
 background: #141b2d;
 border: 1px solid #1e293b;
 text-align: center;
 cursor: pointer;
 transition: all 0.2s;
 text-decoration: none;
 color: #e2e8f0;
}
.mode-card:hover {
 transform: translateY(-4px);
 box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.mode-card.deathmatch { border-color: #1e293b; }
.mode-card.deathmatch:hover { border-color: #818cf8; }
.mode-card.armsrace { border-color: #1e293b; }
.mode-card.armsrace:hover { border-color: #f59e0b; }
.mode-card.roulette { border-color: #1e293b; }
.mode-card.roulette:hover { border-color: #22c55e; }
.mode-card .icon { font-size: 48px; margin-bottom: 16px; }
.mode-card .name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.mode-card .desc { font-size: 13px; color: #94a3b8; line-height: 1.6; }
.mode-card .tag {
 display: inline-block;
 margin-top: 14px;
 padding: 4px 14px;
 border-radius: 20px;
 font-size: 12px;
 font-weight: 600;
}
.tag-deathmatch { background: #1e3a5f; color: #818cf8; }
.tag-armsrace { background: #3b1f3b; color: #f59e0b; }
.tag-roulette { background: #1a3a2a; color: #22c55e; }

.footer {
 margin-top: 48px;
 font-size: 12px;
 color: #475569;
}
</style>
</head>
<body>

</div>

</div>

<div class="modes">
 <a class="mode-card deathmatch" href="经典模式.html">
 <div class="icon">⚔️</div>
 <div class="name">经典模式</div>
 <div class="desc">BO3 · 禁选联盟制<br>两轮抽阵营 · 手指支援<br>散人补员</div>
 <div class="tag tag-deathmatch">⚔️ 经典</div>
 </a>
 <a class="mode-card armsrace" href="军备竞赛.html">
 <div class="icon">⚡</div>
 <div class="name">军备竞赛</div>
 <div class="desc">BO5 · 随机阵营抽选<br>升级制 · 败方手指抽选<br>4v4 · 不禁人</div>
 <div class="tag tag-armsrace">⚡ 新赛制</div>
 </a>
 <a class="mode-card roulette" href="轮盘赌.html">
 <div class="icon">🎰</div>
 <div class="name">轮盘赌</div>
 <div class="desc">BO5 · 金币经济制<br>5种轮盘效果 · G5商店<br>前4局攒钱 · G5一局定胜负</div>
 <div class="tag tag-roulette">🎰 娱乐赛</div>
 </a>
</div>

<div class="footer">边狱巴士 · 斗蛐蛐 &copy; 2026</div>
</body>
</html>
