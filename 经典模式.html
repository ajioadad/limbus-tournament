<title>⚔️ 边狱巴士 · 经典模式</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
 background: #0a0f1a;
 color: #e2e8f0;
 min-height: 100vh;
}
.header {
 background: linear-gradient(135deg, #1e1b4b, #0f172a);
 border-bottom: 1px solid #1e293b;
 padding: 16px 20px;
 text-align: center;
}
.header h1 {
 font-size: 22px;
 font-weight: 800;
 background: linear-gradient(135deg, #818cf8, #f472b6);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
}
.header .sub { font-size: 13px; color: #64748b; margin-top: 4px; }

.container { max-width: 1400px; margin: 0 auto; padding: 12px 16px; }
.section {
 background: #141b2d;
 border: 1px solid #1e293b;
 border-radius: 14px;
 padding: 16px;
 margin-bottom: 12px;
}
.section-title {
 font-size: 15px;
 font-weight: 700;
 margin-bottom: 10px;
 color: #e2e8f0;
}

.btn {
 padding: 9px 20px;
 border: none;
 border-radius: 10px;
 font-family: inherit;
 font-size: 14px;
 font-weight: 600;
 cursor: pointer;
 transition: all 0.15s;
}
.btn:hover { filter: brightness(1.15); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
.btn-primary {
 background: linear-gradient(135deg, #818cf8, #6366f1);
 color: #fff;
}
.btn-success {
 background: linear-gradient(135deg, #22c55e, #16a34a);
 color: #fff;
}
.btn-danger {
 background: linear-gradient(135deg, #ef4444, #dc2626);
 color: #fff;
}
.btn-warning {
 background: linear-gradient(135deg, #eab308, #ca8a04);
 color: #000;
}
.btn-secondary {
 background: #1e293b;
 color: #e2e8f0;
 border: 1px solid #334155;
}

/* Draw Phase */
.draw-area {
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 12px;
 padding: 20px 0;
}
.draw-result {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 14px;
 width: 100%;
 max-width: 1200px;
}
@media (max-width: 800px) { .draw-result { grid-template-columns: 1fr; } }

.player-draw {
 background: #0f172a;
 border: 1px solid #1e293b;
 border-radius: 12px;
 padding: 14px;
}
.player-draw .pd-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: 10px;
}
.player-draw .pd-name {
 font-size: 16px;
 font-weight: 700;
}
.player-draw .pd-factions {
 display: flex;
 flex-direction: column;
 gap: 6px;
}
.faction-card-sm {
 background: #141b2d;
 border: 1px solid #1e293b;
 border-radius: 8px;
 padding: 8px 12px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 cursor: pointer;
 transition: all 0.15s;
}
.faction-card-sm:hover { border-color: #818cf8; }
.faction-card-sm.selected { border-color: #22c55e; background: rgba(34,197,94,0.1); }
.faction-card-sm.used { opacity: 0.4; }
.faction-card-sm .fc-name { font-size: 14px; font-weight: 600; }
.faction-card-sm .fc-count { font-size: 12px; color: #64748b; }
.faction-card-sm .fc-tier { font-size: 11px; }
.tag-finger { color: #f472b6; }
.tag-normal { color: #818cf8; }

/* Game Phase */
.game-phase { display: none; }
.game-phase.active { display: block; }

.game-tabs {
 display: flex;
 gap: 8px;
 margin-bottom: 12px;
}
.game-tab {
 padding: 8px 16px;
 border-radius: 8px;
 font-size: 13px;
 font-weight: 600;
 cursor: pointer;
 border: 1px solid #1e293b;
 background: #0f172a;
 color: #64748b;
}
.game-tab.active {
 background: #1e3a5f;
 border-color: #818cf8;
 color: #e2e8f0;
}
.game-tab.played { background: #141b2d; color: #22c55e; border-color: #22c55e; }

.step-bar {
 display: flex;
 gap: 4px;
 margin-bottom: 14px;
 flex-wrap: wrap;
}
.step {
 padding: 5px 12px;
 border-radius: 6px;
 font-size: 12px;
 background: #0f172a;
 color: #64748b;
 border: 1px solid #1e293b;
}
.step.done { background: #1a3a2a; color: #22c55e; border-color: #22c55e; }
.step.current { background: #1e3a5f; color: #818cf8; border-color: #818cf8; }

.battle-setup {
 display: grid;
 grid-template-columns: 1fr auto 1fr;
 gap: 12px;
 align-items: start;
}
@media (max-width: 900px) { .battle-setup { grid-template-columns: 1fr 1fr; } }

.player-panel {
 background: #0f172a;
 border: 1px solid #1e293b;
 border-radius: 10px;
 padding: 12px;
}
.player-panel .pp-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: 8px;
 padding-bottom: 8px;
 border-bottom: 1px solid #1e293b;
}
.player-panel .pp-name { font-size: 14px; font-weight: 700; }
.player-panel .pp-faction { font-size: 13px; color: #818cf8; }
.pp-body { min-height: 80px; }

.character-grid {
 display: flex;
 flex-wrap: wrap;
 gap: 4px;
}
.char-card {
 display: flex;
 align-items: center;
 gap: 6px;
 padding: 5px 8px;
 border-radius: 6px;
 background: rgba(255,255,255,0.03);
 border: 1px solid transparent;
 cursor: pointer;
 transition: all 0.15s;
 font-size: 12px;
 width: 100%;
}
.char-card:hover { border-color: #334155; background: rgba(255,255,255,0.06); }
.char-card.selected {
 border-color: #22c55e;
 background: rgba(34,197,94,0.1);
 cursor: default;
 opacity: 0.7;
}
.char-card.banned {
 border-color: #ef4444;
 background: rgba(239,68,68,0.1);
 cursor: default;
 opacity: 0.4;
}
.char-card .cc-name { flex: 1; }
.weak-tag{font-size:10px;color:#ef4444;border:1px solid #ef4444;border-radius:3px;padding:0 4px;flex-shrink:0;margin-left:4px;}

.id-badge {
 font-size: 11px;
 font-family: monospace;
 color: #64748b;
 background: rgba(255,255,255,0.05);
 padding: 2px 6px;
 border-radius: 4px;
 flex-shrink: 0;
}
.id-badge:hover { color: #e2e8f0; background: rgba(255,255,255,0.1); }
.char-card .cc-tag {
 font-size: 10px;
 padding: 1px 5px;
 border-radius: 4px;
 flex-shrink: 0;
}
.tag-s { background: #7c3aed; color: #e2e8f0; }
.tag-a { background: #22c55e; color: #000; }
.tag-b { background: #eab308; color: #000; }
.tag-c { background: #ef4444; color: #fff; }
.tag-san { background: #64748b; color: #fff; }
.tag-finger-tag { background: #f472b6; color: #000; }

.pick-area {
 display: flex;
 flex-wrap: wrap;
 gap: 6px;
 margin-top: 8px;
 padding: 8px;
 background: rgba(0,0,0,0.2);
 border-radius: 8px;
 min-height: 50px;
}
.pick-slot {
 width: 36px;
 height: 36px;
 border-radius: 6px;
 border: 2px dashed #334155;
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 11px;
 color: #64748b;
 position: relative;
}
.pick-slot.filled {
 border-style: solid;
 border-color: #22c55e;
 background: rgba(34,197,94,0.15);
 font-size: 10px;
 color: #fff;
 cursor: pointer;
}
.pick-slot.filled .remove {
 position: absolute;
 top: -6px;
 right: -6px;
 width: 16px;
 height: 16px;
 border-radius: 50%;
 background: #ef4444;
 color: #fff;
 font-size: 10px;
 display: flex;
 align-items: center;
 justify-content: center;
 cursor: pointer;
}

.dice-area {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 16px;
 padding: 16px;
 min-width: 120px;
 flex-direction: column;
}

.dice-box {
 width: 60px;
 height: 60px;
 border-radius: 12px;
 background: #1e293b;
 border: 2px solid #334155;
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 30px;
 font-weight: 800;
}
.dice-box.winner { border-color: #22c55e; background: rgba(34,197,94,0.15); }

.vs-divider {
 font-size: 20px;
 font-weight: 800;
 color: #64748b;
 display: flex;
 align-items: center;
 justify-content: center;
}

.status-bar {
 text-align: center;
 padding: 8px;
 font-size: 14px;
 color: #94a3b8;
 margin-top: 8px;
}
.status-bar .highlight { color: #818cf8; font-weight: 600; }

.score-board {
 display: flex;
 justify-content: center;
 gap: 24px;
 padding: 8px 0;
}
.score-item {
 text-align: center;
 padding: 6px 16px;
 border-radius: 8px;
 background: #0f172a;
 border: 1px solid #1e293b;
}
.score-item .si-label { font-size: 12px; color: #64748b; }
.score-item .si-value { font-size: 22px; font-weight: 800; }
.score-item.winner { border-color: #22c55e; }
.score-item .si-name { font-size: 13px; font-weight: 600; }

.toast {
 position: fixed;
 bottom: 24px;
 left: 50%;
 transform: translateX(-50%) translateY(80px);
 background: #141b2d;
 border: 1px solid #1e293b;
 border-radius: 10px;
 padding: 10px 18px;
 font-size: 14px;
 box-shadow: 0 8px 32px rgba(0,0,0,0.5);
 opacity: 0;
 transition: all 0.3s ease;
 z-index: 200;
 pointer-events: none;
 white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.finger-toggle {
 margin-top: 8px;
 padding: 8px 12px;
 border-radius: 8px;
 border: 1px solid #f472b6;
 background: rgba(244,114,182,0.1);
 cursor: pointer;
 font-size: 13px;
 transition: all 0.15s;
 display: flex;
 align-items: center;
 gap: 8px;
}
.finger-toggle:hover { background: rgba(244,114,182,0.2); }
.finger-toggle.active { border-color: #22c55e; background: rgba(34,197,94,0.15); }
</style>

</div>

<!-- GAME PHASE -->
<div id="gameSection" class="section game-phase">

 <span class="pp-faction" id="factionNameA"></span>
 </div>
 <div class="pp-body" id="bodyA"></div>
 <div class="finger-toggle" id="fingerToggleA" onclick="toggleFinger('A')">☝️ 启用手指支援</div>
 </div>

 <div class="dice-area" id="diceArea">

 <div id="diceResult" style="display:none;">
 <div style="display:flex;gap:12px;align-items:center;">
 <div><div style="font-size:11px;color:#818cf8;">蓝方</div><div class="dice-box" id="diceA">-</div></div>
 <div class="vs-divider">VS</div>
 <div><div style="font-size:11px;color:#f472b6;">红方</div><div class="dice-box" id="diceB">-</div></div>
 </div>
 <div style="margin-top:8px;font-size:13px;font-weight:600;" id="diceWinner"></div>
<button class="btn btn-success" id="diceConfirmBtn" style="display:none;margin-top:8px;" onclick="confirmDice()">✅ 确认，开始选人</button>
 </div>
 </div>

 <div class="player-panel" id="panelB">
 <div class="pp-header" style="border-color:#3b1f3b;">
 <span class="pp-name" style="color:#f472b6;">🔴 红方</span>

 <div class="finger-toggle" id="fingerToggleB" onclick="toggleFinger('B')">☝️ 启用手指支援</div>
 </div>
 </div>

 <div class="status-bar" id="statusBar">⬅️ 先完成抽阵营</div>
</div>

</div>

// Faction ban tiers
function getFactionBanTier(name) {
 if(name.indexOf('脑叶')>=0 || name.indexOf('鸿园')>=0) return 'strong';
 if(name.indexOf('协会联盟')>=0||name.indexOf('事务所')>=0||name.indexOf('R公司')>=0||name.indexOf('血魔')>=0||name.indexOf('护卫')>=0) return 'medium';
 return 'weak';
}
function getFactionBanCount(name) {
 return getFactionBanTier(name)==='strong'?2:(getFactionBanTier(name)==='medium'?1:0);
}
function rng(seed) { return function(){ seed=(seed*1664525+1013904223)&0xFFFFFFFF; return (seed>>>0)/4294967296; }; }
function shuffle(a,r) { var arr=a.slice(),i=arr.length,j,t; while(i){j=Math.floor(r()*i--);t=arr[i];arr[i]=arr[j];arr[j]=t;} return arr; }
function sample(arr,n,r) { return shuffle(arr,r).slice(0,n); }
function isWeak(id){return WEAK_SET.has(id);}
function isSan(id){return SANREN.indexOf(id)>=0;}
function isSanTag(id){return isSan(id)?'<span class="cc-tag tag-san">📦散</span>':'';}
function isWeakFaction(name){var w=['剑契组','山庄','N公司','被割舍者','W公司'];for(var i=0;i<w.length;i++){if(name.indexOf(w[i])>=0)return true;}return false;}
function getSinner(id) {
 var name = P[id];
 if (!name) return '未知';
 return name.split(' ')[0];
}
function pickRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

var tt=null;
function toast(m){ var el=document.getElementById('toast'); el.textContent=m; el.className='toast show'; clearTimeout(tt); tt=setTimeout(function(){el.className='toast';},2500); }

// ═══════════ DRAW ═══════════
function startDraw() {
 var seed = Math.floor(Math.random()*99999999);
 var r = rng(seed), r2 = rng(seed+7777);

 var usedFingers = new Set();

 // Draw for A
 var factionsA = sample(NORMAL, 3, r);
 G.A.normal = factionsA;
 var fAvail = FINGERS.filter(function(f,i){ return true; });
 G.A.finger = sample(fAvail, 1, r2)[0];
 usedFingers.add(G.A.finger.name);

 // Draw for B (different finger)
 var factionsB = sample(NORMAL, 3, r);
 G.B.normal = factionsB;
 var fAvailB = FINGERS.filter(function(f){ return f.name !== G.A.finger.name; });
 G.B.finger = sample(fAvailB, 1, r2)[0];

 // Init remaining
 G.A.remaining = factionsA.slice();
 G.B.remaining = factionsB.slice();

 showDrawResult();
 document.getElementById('drawBtn').textContent = '🔄 重新抽阵营';

 // Show game section
 document.getElementById('gameSection').classList.add('active');
 document.getElementById('scoreBoard').style.display = 'block';

 G.currentGame = 0;
 initGame(0);
}

function showDrawResult() {
 var html = '';
 for(var side of ['A','B']) {
 var p = G[side];
 var color = side==='A' ? '🔵 蓝方':'🔴 红方';
 var c = side==='A' ? '#818cf8':'#f472b6';
 html += '<div class="player-draw"><div class="pd-header"><span class="pd-name" style="color:'+c+';">'+color+'</span></div><div class="pd-factions">';
 html += '<div class="faction-card-sm"><span class="fc-name">主阵营</span><span class="fc-count">抽到3个</span></div>';
 for(var f of p.normal) {
 html += '<div class="faction-card-sm"><span>'+f.name+'</span><span class="fc-count">'+f.ids.length+'人</span></div>';
 }
 html += '<div class="faction-card-sm" style="border-color:#f472b6;"><span class="fc-name tag-finger">☝️ 支援：'+p.finger.name+'</span><span class="fc-count">'+p.finger.ids.length+'人</span></div>';
 html += '</div></div>';
 }
 document.getElementById('drawResult').innerHTML = html;
}

// ═══════════ GAME ═══════════
function initGame(gameIdx) {
 G.currentGame = gameIdx;
 G.step = 'select';
 G.A.picked = [];
 G.B.picked = [];
 G.A.bans = [];
 G.B.bans = [];
 G.A.fingerActive = false;
 G.B.fingerActive = false;
 G.A.fingerPick = null;
 G.B.fingerPick = null;
 G.firstPicker = null;

 updateTabs();
 renderGame();
}

function switchGame(idx) {
 if(idx < G.currentGame) return; // can't go back
 if(idx > G.currentGame) {
 // Check if current game is done
 if(G.step !== 'done') { toast('⚠️ 先完成当前场次！'); return; }
 G.currentGame = idx;
 initGame(idx);
 }
 updateTabs();
 renderGame();
}

function updateTabs() {
 var tabs = document.querySelectorAll('.game-tab');
 tabs.forEach(function(t,i){
 t.classList.remove('active','played');
 if(i === G.currentGame) t.classList.add('active');
 else if(i < G.currentGame) t.classList.add('played');
 });
 document.getElementById('scoreA').textContent = G.scores[0];
 document.getElementById('scoreB').textContent = G.scores[1];
 document.getElementById('gameNum').textContent = G.currentGame + 1;
}

function updateSteps() {
 var steps = ['选阵','禁人','骰子','选人','开战'];
 var stepKeys = ['select','ban','dice','pick','done'];
 var idx = stepKeys.indexOf(G.step);
 var html = '';
 for(var i=0;i<steps.length;i++) {
 var cls = 'step';
 if(i < idx) cls += ' done';
 else if(i === idx) cls += ' current';
 html += '<div class="step '+cls+'">'+(i<idx?'✓':'')+steps[i]+'</div>';
 }
 document.getElementById('stepBar').innerHTML = html;
}

 p.remaining[0] = p.remaining[idx];
 p.remaining[idx] = tmp;
 renderGame();
}

function banChar(side, id, max) {
 var arr = side==='A' ? G.B.bans : G.A.bans;
 if(arr.length >= max) { arr.shift(); }
 if(arr.indexOf(id)>=0) { arr.splice(arr.indexOf(id),1); return; }
 arr.push(id);
 renderGame();
}

function confirmBan() {
 if(G.A.bans.length<getFactionBanCount(G.A.remaining[0].name)||G.B.bans.length<getFactionBanCount(G.B.remaining[0].name)){toast('⚠️ 还未禁完！');return;}

 G.step = 'dice';
 renderGame();
}

function rollDice() {
 var dA,dB;
 do { dA=Math.floor(Math.random()*6)+1; dB=Math.floor(Math.random()*6)+1; } while(dA===dB);

 document.getElementById('diceA').textContent=dA;
 document.getElementById('diceB').textContent=dB;
 document.getElementById('diceA').className='dice-box'+(dA>dB?' winner':'');
 document.getElementById('diceB').className='dice-box'+(dB>dA?' winner':'');

 G.firstPicker=dA<=dB?'A':'B';
 var fn=G.firstPicker==='A'?'蓝方':'红方';
 var sn=G.firstPicker==='A'?'红方':'蓝方';
 document.getElementById('diceWinner').innerHTML='🎲 '+fn+'先选 | '+sn+'后选';

}

function confirmDice() {
 if(!G.firstPicker) { G.firstPicker = 'A'; }

 renderGame();

function renderPickPhase() {
 document.getElementById('diceResult').style.display='none';
 document.getElementById('diceConfirmBtn').style.display='none';
 var pA = G.A, pB = G.B;
 var fA = pA.remaining[0], fB = pB.remaining[0];

 document.getElementById('factionNameA').textContent = fA.name;
 document.getElementById('factionNameB').textContent = fB.name;

 var first = G.firstPicker;
 var second = first === 'A' ? 'B' : 'A';

 // Get available characters (excluding banned)
 var availA=fA.ids.filter(function(id){return G.A.bans.indexOf(id)<0;});
 var availB=fB.ids.filter(function(id){return G.B.bans.indexOf(id)<0;});

 // Fill available pool considering unique sinner limit
 function fillPool(arr, side) {
 var p = G[side];
 if(p.sanrenAdd && p.sanrenAdd.length) return arr.concat(p.sanrenAdd);
 var unique = {};
 for(var id of arr) unique[getSinner(id)] = true;
 var uCount = Object.keys(unique).length;
 if(uCount >= 5) return arr;
 var need = 5 - uCount;
 var pool = SANREN.slice();
 pool = shuffle(pool, rng(Date.now() + 7777 * (side==='A'?0:1)));
 var added = [];
 for(var i=0; i<pool.length && added.length<need; i++){
 var sin = getSinner(pool[i]);
 if(!unique[sin]){ added.push(pool[i]); unique[sin] = true; }
 }
 p.sanrenAdd = added;
 return arr.concat(added);
 }
 availA = fillPool(availA, 'A');
 availB = fillPool(availB, 'B');

 // Determine which side is picking now
 var picking = null;
 var waiting = null;
 if(first === 'A') {
 picking = pA.picked.length < 5 ? 'A' : (pB.picked.length < 5 ? 'B' : null);
 } else {
 picking = pB.picked.length < 5 ? 'B' : (pA.picked.length < 5 ? 'A' : null);
 }
 if(picking) waiting = picking === 'A' ? 'B' : 'A';

 // Render A's pick area
 var htmlA = renderPickSide('A', fA, availA, picking);
 document.getElementById('bodyA').innerHTML = htmlA;

 var htmlB = renderPickSide('B', fB, availB, picking);
 document.getElementById('bodyB').innerHTML = htmlB;

 document.getElementById('diceBtn').style.display = 'none';
 document.getElementById('diceResult').style.display = 'block';

 // Status
 if(picking) {
 var pName = picking === 'A' ? '🔵 蓝方' : '🔴 红方';
 var count = picking === 'A' ? pA.picked.length : pB.picked.length;
 document.getElementById('statusBar').innerHTML = '✋ '+pName+' 选人中...（'+(5-count)+'/5）';
 // Check if finger is used and adjust
 if(picking === 'A' && pA.fingerActive) {
 document.getElementById('statusBar').innerHTML += '<br><span style="color:#f472b6;">☝️ 手指支援已启用，只需再选4人</span>';
 }
 if(picking === 'B' && pB.fingerActive) {
 document.getElementById('statusBar').innerHTML += '<br><span style="color:#f472b6;">☝️ 手指支援已启用，只需再选4人</span>';
 }
 } else {
 // All picked
 if(pA.picked.length >= 5 && pB.picked.length >= 5) {
 document.getElementById('statusBar').innerHTML = '<button class="btn btn-success" onclick="confirmPicks()">✅ 确认阵容，开战！</button>';
 } else {
 document.getElementById('statusBar').innerHTML = '⏳ 等待选人完成...';
 }
 }
}

function renderPickSide(side, faction, avail, picking) {
 var p = G[side];
 var need = 5;
 var picked = p.picked;
 var canPick = picking === side && picked.length < need;

 var html = '';

 // Picked slots
 html += '<div style="font-size:12px;color:#64748b;margin-bottom:4px;">已选（'+(picked.length)+'/5）</div>';
 html += '<div class="pick-area">';
 for(var i=0;i<need;i++) {
 if(i < picked.length) {
 var pid = picked[i];
 var isFinger = p.fingerActive && i === 0;
 var name = isFinger ? '☝️'+P[pid].split(' ')[1] : P[pid].split(' ')[1];
 html += '<div class="pick-slot filled" onclick="removePick(\''+side+'\','+i+')" title="点击移除">';
 html += '<span class="remove">×</span><span class="id-badge">'+pid+'</span>'+name.substring(0,4);
 html += '</div>';
 } else {
 html += '<div class="pick-slot">'+(i+1)+'</div>';
 }
 }
 html += '</div>';

 // Available characters to pick
 html += '<div style="font-size:12px;color:#64748b;margin:8px 0 4px;">可选人物'+(canPick?'（点击添加）':'')+'：</div>';
 html += '<div class="character-grid">';
 for(var id of avail) {
 var isPicked = picked.indexOf(id) !== -1;
 if(isPicked) continue;
 var isSan = SANREN.indexOf(id) !== -1;
 var name = P[id];
 html += '<div class="char-card'+(canPick?'" onclick="addPick(\''+side+'\','+id+')"':'')+'">';
 html += '';
 html += '<span class="id-badge">'+id+'</span> <span class="cc-name">'+name+'</span>'+(isWeak(id)&&isWeakFaction(side==='A'?G.A.remaining[0].name:G.B.remaining[0].name)?'<span class="weak-tag">△弱</span>':'')+'';

 html += '</div>';
 }
 html += '</div>';

 // Finger info
 if(p.fingerActive && p.fingerPick) {
 html += '<div style="margin-top:6px;padding:4px 8px;background:rgba(244,114,182,0.1);border-radius:6px;font-size:12px;">';
 html += '☝️ 手指支援：'+P[p.fingerPick].split(' ')[1]+'</div>';
 }

 return html;
}

function addPick(side, id) {
 var p = G[side];
 var need = 5;
 if(p.picked.length >= need) return;

 // If finger is active, first slot is taken by finger


 p.picked.push(id);
 renderGame();
}

function removePick(side, idx) {
 var p = G[side];
 if(p.fingerActive && p.fingerPick && p.picked[idx] === p.fingerPick) {
 toast('⚠️ 手指支援人格不可移除');
 return;
 }
 p.picked.splice(idx, 1);
 renderGame();
}

function toggleFinger(side) {
 var p = G[side];
 if(G.usedFingers[side]) { toast('⚠️ 手指已经用过了！'); return; }
 if(p.remaining.length === 0) { toast('⚠️ 没有可用的手指'); return; }
 p.fingerActive = !p.fingerActive;
 if(p.fingerActive) {
 // Random pick from finger
 p.fingerPick = pickRandom(p.finger.ids);
 p.picked = [p.fingerPick]; // Finger takes first slot
 G.usedFingers[side] = true;
 } else {
 p.fingerPick = null;
 p.picked = [];
 }
 renderGame();
 toast((p.fingerActive?'☝️ ':'❌ ')+(side==='A'?'蓝方':'红方')+'手指支援'+(p.fingerActive?'已启用！':'已取消'));
}

function confirmPicks() {
 G.step = 'done';
 renderGame();
}

function renderDonePhase() {
 document.getElementById('diceResult').style.display='none';
 document.getElementById('diceConfirmBtn').style.display='none';
 var pA = G.A, pB = G.B;
 var fA = pA.remaining[0], fB = pB.remaining[0];

 document.getElementById('factionNameA').textContent = fA.name;
 document.getElementById('factionNameB').textContent = fB.name;

 // Show final lineups
 var htmlA = '<div style="font-size:13px;font-weight:600;color:#22c55e;margin-bottom:6px;">✅ 最终阵容</div><div class="character-grid">';
 for(var id of pA.picked) {
 var isFinger = pA.fingerActive && pA.fingerPick === id;
 htmlA += '<div class="char-card" style="border-color:#22c55e;cursor:default;">';
 htmlA += '';
 htmlA += '<span class="id-badge">'+id+'</span> <span class="cc-name">'+P[id]+'</span>'+(isWeak(id)&&isWeakFaction(fA.name)?'<span class="weak-tag">△弱</span>':'')+'';

 htmlA += '</div>';
 }
 htmlA += '</div>';
 if(pA.fingerActive) htmlA += '<div style="font-size:11px;color:#f472b6;margin-top:4px;">☝️ 手指支援已启用</div>';
 document.getElementById('bodyA').innerHTML = htmlA;

 var htmlB = '<div style="font-size:13px;font-weight:600;color:#22c55e;margin-bottom:6px;">✅ 最终阵容</div><div class="character-grid">';
 for(var id of pB.picked) {
 var isFinger = pB.fingerActive && pB.fingerPick === id;
 htmlB += '<div class="char-card" style="border-color:#22c55e;cursor:default;">';
 htmlB += '';
 htmlB += '<span class="id-badge">'+id+'</span> <span class="cc-name">'+P[id]+'</span>'+(isWeak(id)&&isWeakFaction(fB.name)?'<span class="weak-tag">△弱</span>':'')+'';

 htmlB += '</div>';
 }
 htmlB += '</div>';
 if(pB.fingerActive) htmlB += '<div style="font-size:11px;color:#f472b6;margin-top:4px;">☝️ 手指支援已启用</div>';
 document.getElementById('bodyB').innerHTML = htmlB;

 document.getElementById('statusBar').innerHTML = '<div style="display:flex;gap:10px;justify-content:center;">'+
 '<button class="btn btn-success" onclick="recordWin(\'A\')">🏆 蓝方胜</button>'+
 '<button class="btn btn-danger" onclick="recordWin(\'B\')">🏆 红方胜</button>'+
 '</div>';
}

function recordWin(side) {
 var idx = side === 'A' ? 0 : 1;
 G.scores[idx]++;
 G.A.remaining.shift();
 G.B.remaining.shift();

 updateTabs();

 if(G.scores[0] >= 2 || G.scores[1] >= 2 || G.currentGame >= 2) {
 var winner = G.scores[0] >= 2 ? '🔵 蓝方' : G.scores[1] >= 2 ? '🔴 红方' : '比赛结束';
 if(G.scores[0] > G.scores[1]) winner = '🔵 蓝方';
 else if(G.scores[1] > G.scores[0]) winner = '🔴 红方';
 else winner = '平局';
 toast('🏆 '+winner+' 赢得系列赛！');
 document.getElementById('statusBar').innerHTML = '🏆 系列赛结束！'+winner+' 获胜！<br><button class="btn btn-primary" onclick="location.reload()">🔄 开始新系列赛</button>';
 return;
 }

 if(G.currentGame < 2) {
 G.currentGame++;
 initGame(G.currentGame);
 }
}
</script>
</body>
