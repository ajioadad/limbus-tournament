<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
 background: #0a0f1a;
 color: #e2e8f0;
 min-height: 100vh;
}
.header {
 background: linear-gradient(135deg, #1a3a2a, #0f172a);
 border-bottom: 1px solid #1e293b;
 padding: 16px 20px;
 text-align: center;
}
.header h1 {
 font-size: 22px; font-weight: 800;
 background: linear-gradient(135deg, #22c55e, #f59e0b);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
}
.header .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 12px 16px; }
.section {
 background: #141b2d;
 border: 1px solid #1e293b;
 border-radius: 14px;
 padding: 16px;
 margin-bottom: 12px;
}
.section-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #e2e8f0; }

.btn {
 padding: 9px 20px;
 border: none;
 border-radius: 10px;
 font-family: inherit;
 font-size: 14px;
 font-weight: 600;
 cursor: pointer;
 transition: all 0.15s;
}
.btn:hover { filter: brightness(1.15); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
.btn-primary { background: linear-gradient(135deg,#818cf8,#6366f1); color: #fff; }
.btn-success { background: linear-gradient(135deg,#22c55e,#16a34a); color: #fff; }
.btn-danger { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff; }
.btn-warning { background: linear-gradient(135deg,#eab308,#ca8a04); color: #000; }
.btn-gold { background: linear-gradient(135deg,#f59e0b,#d97706); color: #000; }

.game-phase { display: none; }
.game-phase.active { display: block; }

.game-tabs {
 display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.game-tab {
 padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
 cursor: pointer; border: 1px solid #1e293b; background: #0f172a; color: #64748b;
}
.game-tab.active { background: #1a3a2a; border-color: #22c55e; color: #e2e8f0; }
.game-tab.played { background: #141b2d; color: #22c55e; border-color: #22c55e; }

.step-bar {
 display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center;
}
.step {
 padding: 5px 12px; border-radius: 6px; font-size: 12px;
 background: #0f172a; color: #64748b; border: 1px solid #1e293b;
}
.step.done { background: #1a3a2a; color: #22c55e; border-color: #22c55e; }
.step.current { background: #1a3a2a; color: #f59e0b; border-color: #f59e0b; }

/* Score */
.score-bar {
 display: flex; justify-content: center; gap: 20px; padding: 8px 0; align-items: center;
}
.score-box {
 text-align: center; padding: 6px 18px; border-radius: 8px; background: #0f172a; border: 1px solid #1e293b; min-width: 80px;
}
.score-box .sb-label { font-size: 12px; color: #64748b; }
.score-box .sb-val { font-size: 24px; font-weight: 800; }
.score-box .sb-gold { font-size: 12px; color: #f59e0b; margin-top: 2px; }

/* Wheel */
.wheel-area { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px 0; }
.wheel-result {
 font-size: 24px; font-weight: 700; padding: 12px 28px;
 border-radius: 10px; text-align: center;
}
.wheel-result.r0 { background: rgba(34,197,94,0.15); border: 1px solid #22c55e; color: #22c55e; }
.wheel-result.r1 { background: rgba(234,179,8,0.15); border: 1px solid #eab308; color: #eab308; }
.wheel-result.r2 { background: rgba(168,85,247,0.15); border: 1px solid #a855f7; color: #a855f7; }
.wheel-result.r3 { background: rgba(59,130,246,0.15); border: 1px solid #3b82f6; color: #3b82f6; }
.wheel-result.r4 { background: rgba(239,68,68,0.15); border: 1px solid #ef4444; color: #ef4444; }

/* Draw */
.draw-grid { display: flex; gap: 16px; justify-content: center; align-items: center; flex-wrap: wrap; }
.draw-card {
 background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 16px; min-width: 220px; text-align: center;
}
.draw-card .dc-faction { font-size: 18px; font-weight: 700; margin: 6px 0; }
.draw-card .dc-tier { font-size: 13px; color: #64748b; }

/* Char list */
.char-list { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto; margin: 8px 0; }
.char-item {
 display: flex; align-items: center; gap: 8px;
 padding: 6px 10px; border-radius: 6px;
 background: rgba(255,255,255,0.03); border: 1px solid transparent;
 cursor: pointer; transition: all 0.12s; font-size: 13px;
}
.char-item:hover { border-color: #334155; background: rgba(255,255,255,0.06); }
.char-item .ci-id { font-size: 11px; color: #64748b; width: 50px; flex-shrink: 0; font-family: monospace; }
.char-item .ci-name { flex: 1; }

/* Pick */
.pick-area { display: flex; flex-direction: column; gap: 6px; }
.pick-slot {
 width: 100%; min-height: 40px; border-radius: 8px;
 border: 2px dashed #334155;
 display: flex; align-items: center; padding: 6px 12px; font-size: 13px; color: #64748b; position: relative;
}
.pick-slot.filled {
 border-style: solid; border-color: #22c55e; background: rgba(34,197,94,0.1); color: #e2e8f0;
}
.pick-slot .remove {
 position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%;
 background: #ef4444; color: #fff; font-size: 10px; display: flex;
 align-items: center; justify-content: center; cursor: pointer;
}
.pick-slot .pick-id { font-size: 11px; color: #64748b; margin-right: 8px; flex-shrink: 0; font-family: monospace; }
.pick-slot .pick-name { flex: 1; }

.battle-panels { display: flex; gap: 14px; align-items: flex-start; }
.battle-panels > .player-panel { flex: 1; min-width: 0; }
@media (max-width:500px) { .battle-panels { flex-direction: column; } }
.player-panel {
 background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; padding: 14px;
 min-width:0; overflow:hidden;
}
.player-panel .pp-header {
 display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
 padding-bottom: 8px; border-bottom: 1px solid #1e293b;
}
.player-panel .pp-name { font-size: 14px; font-weight: 700; }
.player-panel .pp-faction { font-size: 13px; color: #22c55e; }

/* Dice */
.dice-row {
 display: flex; align-items: center; justify-content: center; gap: 24px; padding: 20px 0; flex-wrap: wrap;
}
.dice-box {
 width: 64px; height: 64px; border-radius: 12px;
 background: #1e293b; border: 2px solid #334155;
 display: flex; align-items: center; justify-content: center;
 font-size: 32px; font-weight: 800;
}
.dice-box.winner { border-color: #22c55e; background: rgba(34,197,94,0.15); }

/* Final */
.final-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.final-card {
 padding: 8px 14px; border-radius: 8px; background: rgba(34,197,94,0.08); border: 1px solid #22c55e; font-size: 13px;
}
.final-card .fc-id { font-size: 11px; color: #64748b; margin-right: 6px; }
.final-card.finger-card { border-color: #f472b6; background: rgba(244,114,182,0.1); }

/* Shop */
.shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width:800px) { .shop-grid { grid-template-columns: 1fr; } }
.shop-section { margin-bottom: 12px; }
.shop-section-title { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1e293b; }
.shop-item {
 display: flex; align-items: center; gap: 10px;
 padding: 8px 12px; border-radius: 8px;
 background: #0f172a; border: 1px solid #1e293b;
 margin-bottom: 4px; cursor: pointer; transition: all 0.12s;
}
.shop-item:hover { border-color: #f59e0b; }
.shop-item.bought { border-color: #22c55e; background: rgba(34,197,94,0.1); }
.shop-item .si-icon { font-size: 18px; }
.shop-item .si-name { flex: 1; font-size: 13px; }
.shop-item .si-price { font-size: 12px; color: #f59e0b; font-weight: 700; }
.shop-item .si-check { font-size: 12px; color: #22c55e; }
.shop-item .si-iname { font-size: 11px; color: #64748b; display: block; width: 100%; }

.gold-display {
 display: inline-flex; align-items: center; gap: 4px;
 padding: 3px 12px; border-radius: 12px;
 background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3);
 font-size: 14px; font-weight: 700; color: #f59e0b;
}

.status-area { text-align: center; padding: 12px 8px; font-size: 14px; color: #94a3b8; margin-top: 8px; }

.toast {
 position: fixed; bottom: 24px; left: 50%;
 transform: translateX(-50%) translateY(80px);
 background: #141b2d; border: 1px solid #1e293b; border-radius: 10px;
 padding: 10px 18px; font-size: 14px;
 box-shadow: 0 8px 32px rgba(0,0,0,0.5);
 opacity: 0; transition: all 0.3s ease;
 z-index: 200; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

function setFac(side,nm){

}

function rerollFac(side){
 var p=G[side];
 if(!p.reroll){t('没有重抽币了');return;}
 p.reroll=false; // consume
 var rk=G.g5r;
 var pool=(rk==='high')?F_HIGH:(rk==='low')?F_LOW:ALL_F;
 p.fac=fillFac(pk(pool));
 p.pk=[];
 if(p.fi) p.pk.push(p.fi);
 ren();
 t((side==='A'?'蓝方':'红方')+' 重抽 → '+p.fac.name);
}

function goDice(){
 // G5: if only ONE side bought 'first', they get the advantageous position
 var rk=G.cur<4?G.ws[G.cur]:G.g5r;
 var isLot=rk==='lottery';
 var onlyFirst = (G.A.first||G.B.first) && !(G.A.first&&G.B.first);
 if(G.cur===4 && onlyFirst){
 // 大乐透:先选=赚, 其他:后选=赚
 var adv = G.A.first?'A':'B';
 G.fp = isLot ? adv : (adv==='A'?'B':'A');
 G.phase='pick';rPick();return;
 }
 G.phase='dice';rDice();
}

 }
 // Auto-fill sanren if not enough unique options (cached)
 var uniqueCount=0;
 for(var id of displayList){if(!locked[id]) uniqueCount++;}
 if(uniqueCount<(5-p.pk.length)){
 if(!p._sanren){
 var pool=SANREN.filter(function(i){return p.pk.indexOf(i)<0&&displayList.indexOf(i)<0&&!pickedSinners[sinner(i)];});
 if(pool.length>0) p._sanren=pool[r(pool.length)];
 }

 }

 h+='</div>';

 h+='<div style="font-size:12px;color:#64748b;padding:8px 0;">⏳ 等待对方选人...</div>';
 }
 h+='</div>';
 return h;

 if(i<p.pk.length){
 var id=p.pk[i];
 h+='<div class="pick-slot filled"><span class="pick-id">'+id+'</span><span class="pick-name">'+fn(id)+'</span>';
 h+='<span class="remove" onclick="rmLot('+i+',\''+side+'\')">×</span></div>';
 }else h+='<div class="pick-slot">'+(i+1)+'</div>';
 }
 h+='</div></div>';
 }
 h+='</div>';
 var taken=G.A.pk.length+G.B.pk.length;
 var turn = taken<10?((taken%2===0)?G.fp:(G.fp==='A'?'B':'A')):null;
 if(turn) h+='<div style="margin:8px 0;font-size:13px;color:#94a3b8;">✋ '+(turn==='A'?'蓝方':'红方')+'选人</div>';
 else h+='<button class="btn btn-success" onclick="goDone()">✅ 选人完成</button>';
 h+='<div class="char-list">';
 for(var id of G.lt){
 if(G.A.pk.indexOf(id)>=0||G.B.pk.indexOf(id)>=0) continue;
 h+='<div class="char-item" onclick="ltPk('+id+')"><span class="ci-id" onclick="event.stopPropagation();copyId(this.textContent)">'+id+'</span><span class="ci-name">'+fn(id)+'</span></div>';
 }
 h+='</div>';
 document.getElementById('mainArea').innerHTML=h;
}
function ltPk(id){
 var taken=G.A.pk.length+G.B.pk.length;
 if(taken>=10) return;
 var turn=taken<10?((taken%2===0)?G.fp:(G.fp==='A'?'B':'A')):null;
 if(!turn) return;
 G[turn].pk.push(id);
 ren();
}
function rmLot(i,side){
 G[side].pk.splice(i,1);
 ren();
}

// ═══ DONE ═══
function rDone(){
 document.getElementById('statusArea').innerHTML='';
 // Assign slot-up random unit for G5
 if(G.cur===4){
 for(var side of ['A','B']){
 var p=G[side];
 if(p.su&&!p.suId&&p.pk.length>0) p.suId=p.pk[r(p.pk.length)];
 }
 }
 var h='<div class="section"><div class="section-title">'+(G.cur===4?'🏆 第5局结果':'⚔️ 第'+(G.cur+1)+'局结果')+'</div>';
 h+='<div class="battle-panels">';
 for(var side of ['A','B']){
 var p=G[side];
 var fname=p.fac?p.fac.name:'-';
 h+='<div class="player-panel"><div class="pp-header"><span class="pp-name" style="color:'+(side==='A'?'#818cf8':'#f472b6')+';">'+(side==='A'?'🔵 蓝方':'🔴 红方')+'</span>';
 h+='<span class="pp-faction">'+fname+'</span></div><div class="final-grid">';
 for(var id of p.pk){
 var fg=G.cur===4&&p.fi===id;
 var sg=G.cur===4&&p.su&&p.suId===id;
 h+='<div class="final-card'+(fg?' finger-card':'')+(sg?' finger-card':'')+'" style="'+(sg?'border-color:#f59e0b;background:rgba(245,158,11,0.1);':'')+'"><span class="fc-id" onclick="copyId(this.textContent)" style="cursor:pointer;">'+id+'</span>'+fn(id);
 if(fg) h+=' ☝️';
 if(sg) h+=' ⚡';
 h+='</div>';
 }
 h+='</div></div>';
 }
 h+='</div><div style="text-align:center;margin-top:12px;">';
 if(G.cur===4){
 h+='<div style="font-size:18px;font-weight:700;color:#f59e0b;margin-bottom:12px;">🏆 最终决战</div>';
 h+='<button class="btn btn-success" onclick="g5W(\'A\')">🏆 蓝方胜</button> ';
 h+='<button class="btn btn-danger" onclick="g5W(\'B\')">🏆 红方胜</button>';
 } else {
 h+='<button class="btn btn-success" onclick="gw(\'A\')">🏆 蓝方胜</button> ';
 h+='<button class="btn btn-danger" onclick="gw(\'B\')">🏆 红方胜</button>';
 }
 h+='</div>';
 
 // Swap: add UI before battle for G5
 if(G.cur===4){
  for(var s of ['A','B']){
   if(G[s].swap&&!G[s]._swapped){
    h+='<div style="margin-top:12px;text-align:center;border-top:1px solid #1e293b;padding-top:12px;">';
    h+='<div style="font-size:14px;color:#f59e0b;margin-bottom:8px;">🔄 '+(s==='A'?'蓝方':'红方')+' 点击要换掉的人格（随机散人替换）：</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">';
    for(var id of G[s].pk){
     h+='<div class="char-item" onclick="swapChar('+id+',\''+s+'\')" style="cursor:pointer;border:1px solid #f59e0b;">';
     h+='<span class="ci-id">'+id+'</span><span class="ci-name">'+fn(id)+'</span></div>';
    }
    h+='</div></div>';
    break;
   }
  }
 }
document.getElementById('mainArea').innerHTML=h;
}


function banCharDraw(id,side){
 var other=side==='A'?'B':'A';
 G[side]._bannedId=id;
 G[side]._banned=true;
 // Remove from opponent's faction ids
 var idx=G[other].fac.ids.indexOf(id);
 if(idx>=0) G[other].fac.ids.splice(idx,1);
 t('🔫 已禁 '+fn(id));
 ren();
}
function banChar(id,side){
 var other=side==='A'?'B':'A';
 var p=G[other];
 var idx=p.pk.indexOf(id);
 if(idx<0) return;
 p.pk.splice(idx,1);
 var sinners={};
 for(var pid of p.pk) sinners[sinner(pid)]=true;
 var found=false;
 for(var san of SANREN){
  if(!sinners[sinner(san)]&&p.pk.indexOf(san)<0){p.pk.push(san);found=true;break;}
 }
 if(!found) p.pk.push(SANREN[0]);
 G[side]._banned=true;
 t('🔫 已禁');
 goDone();
}
function swapChar(id,side){
 var p=G[side];
 var idx=p.pk.indexOf(id);
 if(idx<0) return;
 p.pk.splice(idx,1);
 var sinners={};
 for(var pid of p.pk) sinners[sinner(pid)]=true;
 var found=false;
 for(var san of SANREN){
  if(!sinners[sinner(san)]&&p.pk.indexOf(san)<0){p.pk.push(san);found=true;break;}
 }
 if(!found) p.pk.push(SANREN[0]);
 G[side]._swapped=true;
 t('🔄 已换将');
 goDone();
}

function gw(side){
 var rk=G.ws[G.cur];
 var bn=(rk==='lottery'||rk==='fate')?1:0;
 G[side].g+=3+bn;
 G[side==='A'?'B':'A'].g+=2;
 t((side==='A'?'蓝方':'红方')+'胜！+'+(3+bn)+'金'+(bn?'(含奖励)':''));
 G.cur++;
 if(G.cur>=4){G.phase='shop';ren();}else{G.phase='wheel';ren();tabUpd();}
}

function g5W(side){
 t('🏆 '+(side==='A'?'蓝方':'红方')+'赢得轮盘赌！');
 document.getElementById('statusArea').innerHTML='🏆 系列赛结束！'+(side==='A'?'蓝方':'红方')+'获胜！<br><br><button class="btn btn-gold" onclick="res()">🔄 新系列赛</button>';
}

// ═══ SHOP ═══
function enterShop(){G.phase='shop';rShop();}

function rShop(){
 var h='<div class="section"><div class="section-title">🛒 赌场商店</div>';
 h+='<div style="text-align:center;margin-bottom:10px;">';
 h+='<span class="gold-display">🔵 蓝方 '+G.A.g+'金</span>';
 h+='<span style="margin:0 16px;color:#64748b;">🆚</span>';
 h+='<span class="gold-display">🔴 红方 '+G.B.g+'金</span>';
 h+='</div>';
 h+='<div class="shop-grid"><div class="shop-column">';
 h+=sCol('A');h+='</div><div class="shop-column">';h+=sCol('B');h+='</div></div>';
 h+='<div style="text-align:center;margin-top:12px;"><button class="btn btn-primary" onclick="sOK()">✅ 购买完成，进入第5局</button></div>';
 
 // Universal ban UI for all modes (except lottery)
 if(G.cur===4){
  var brk=G.g5r;
  if(brk!=='lottery'){
   for(var s of ['A','B']){
    var other=s==='A'?'B':'A';
    if(G[s].ban&&!G[s]._banned&&G[other].fac){
     h+='<div style="margin-top:12px;text-align:center;border-top:1px solid #1e293b;padding-top:12px;">';
     h+='<div style="font-size:14px;color:#ef4444;margin-bottom:8px;">🔫 '+(s==='A'?'蓝方':'红方')+' 选择对方阵营要禁掉的人格（被禁的不会在对方选人列表出现）：</div>';
     h+='<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">';
     for(var id of G[other].fac.ids){
      h+='<div class="char-item" onclick="banCharDraw('+id+',\''+s+'\')" style="cursor:pointer;border:1px solid #ef4444;">';
      h+='<span class="ci-id">'+id+'</span><span class="ci-name">'+fn(id)+'</span></div>';
     }
     h+='</div></div>';
     break;
    }
   }
  }
 }
document.getElementById('mainArea').innerHTML=h;
 document.getElementById('statusArea').innerHTML='双方同时选商品，互相可见';
}

function sCol(side){
 var p=G[side];
 var its=[
 {k:'reroll',ic:'🪙',nm:'重抽币',pr:2,desc:'全上等/下等/镜像/命运可用'},
 {k:'first',ic:'🎲',nm:'先手',pr:2,desc:'全上等/下等/镜像/大乐透可用'},
 {k:'finger',ic:'☝️',nm:'命运手指',pr:6,desc:'全部赛制可用'},
 {k:'swap',ic:'🔄',nm:'换将',pr:6,desc:'大乐透无效'},
 {k:'ban',ic:'🔫',nm:'禁人',pr:5,desc:'大乐透无效'},
 {k:'selfpick',ic:'🏰',nm:'自选阵营',pr:8,desc:'大乐透无效'},
 ];
 var h='<div class="shop-section"><div class="shop-section-title">'+(side==='A'?'🔵 蓝方':'🔴 红方')+' · 正常商品</div>';
 for(var it of its){
 var b=p[it.k];
 h+='<div class="shop-item'+(b?' bought':'')+'" onclick="tog(\''+side+'\',\''+it.k+'\','+it.pr+')">';
 h+='<span class="si-icon">'+it.ic+'</span><span class="si-name">'+it.nm+'</span>';
 h+='<span class="si-price">'+it.pr+'金</span>';
 if(b) h+='<span class="si-check">✓</span>';
 h+='<div style="font-size:10px;color:#64748b;margin-top:2px;">'+it.desc+'</div>';
 h+='</div>';
 }
 h+='</div>';
 h+='<div class="shop-section"><div class="shop-section-title">🎰 轮盘效果</div>';
 var rs=[
 {k:'rh',ic:'🔴',nm:'全上等',pr:4},{k:'rl',ic:'🔵',nm:'全下等',pr:4},
 {k:'rm',ic:'🟣',nm:'镜像对决',pr:4},{k:'rlt',ic:'🎲',nm:'大乐透',pr:4},
 {k:'rf',ic:'🎰',nm:'命运之手',pr:4},
 ];
 for(var it of rs){
 var b=p[it.k];
 h+='<div class="shop-item'+(b?' bought':'')+'" onclick="tog(\''+side+'\',\''+it.k+'\','+it.pr+')">';
 h+='<span class="si-icon">'+it.ic+'</span><span class="si-name">'+it.nm+'</span>';
 h+='<span class="si-price">'+it.pr+'金</span>';
 if(b) h+='<span class="si-check">✓</span>';
 h+='</div>';
 }
 h+='</div>';
 return h;
}

function tog(side,k,pr){
 var p=G[side];
 if(p[k]){delete p[k];p.g+=pr;rShop();return;}
 // Roulette effects: each side can only buy one
 if(['rh','rl','rm','rlt','rf'].indexOf(k)>=0){
  for(var rk of ['rh','rl','rm','rlt','rf']) if(p[rk]){t('轮盘效果每方限购一个！');return;}
 }
 if(p.g<pr){t('金币不足！');return;}
 p[k]=true;p.g-=pr;rShop();
}

function sOK(){
 // Gather roulette purchases (only roulette keys, not 'reroll' or other items)
 var rA=[],rB=[];
 var rKeys=['rh','rl','rm','rlt','rf'];
 var map={'rh':'high','rl':'low','rm':'mirror','rlt':'lottery','rf':'fate'};
 for(var k of rKeys){if(G.A[k])rA.push(map[k]);if(G.B[k])rB.push(map[k]);}
 var chosen;
 if(rA.length===0&&rB.length===0) chosen=null;
 else if(rA.length>0&&rB.length===0) chosen=rA[0];
 else if(rA.length===0&&rB.length>0) chosen=rB[0];
 else{
 var pool=rA.concat(rB);
 chosen=pool[r(pool.length)];
 }
 G.g5r=chosen;
 // Apply finger
 for(var side of ['A','B']){
 var p=G[side];
 if(p.finger){
 var fd=pk([{n:'拇指',i:[10512,10916]},{n:'食指',i:[10115,10314]},{n:'中指',i:[10715,11115]},{n:'环指',i:[10215,10614,10915]},{n:'小指',i:[10415,11015]}]);
 p.ff=fd.n;p.fi=pk(fd.i);
 }
 if(p.first) p.first=true;
 if(p.reroll) p.reroll=true;
 if(p.swap) p.swap=true;
 if(p.ban) p.ban=true;
 if(p.selfpick) p.selfpick=true;
 }
 // Show summary
 var sm='<div class="section"><div style="text-align:center;">';
 sm+='<div style="font-size:16px;font-weight:700;color:#f59e0b;margin-bottom:8px;">🛒 购买结果</div>';
 var itemsA=[],itemsB=[];
 var keys=['reroll','first','finger','swap','ban','selfpick','rh','rl','rm','rlt','rf'];
 var nameMap={reroll:'重抽币',first:'先手',finger:'命运手指',swap:'换将',ban:'禁人',selfpick:'自选阵营',rh:'全上等',rl:'全下等',rm:'镜像对决',rlt:'大乐透',rf:'命运之手'};
 for(var k of keys){if(G.A[k])itemsA.push(nameMap[k]||k);if(G.B[k])itemsB.push(nameMap[k]||k);}
 sm+='<div style="display:flex;justify-content:center;gap:24px;font-size:13px;">';
 sm+='<div style="text-align:left;"><span style="color:#818cf8;">🔵 蓝方:</span> '+(itemsA.length?itemsA.join(', '):'无购买')+'</div>';
 sm+='<div style="text-align:left;"><span style="color:#f472b6;">🔴 红方:</span> '+(itemsB.length?itemsB.join(', '):'无购买')+'</div>';
 sm+='</div>';
 if(chosen){var ri=R_KEYS.indexOf(chosen);if(ri>=0)sm+='<div style="margin-top:8px;color:#22c55e;font-weight:600;">第5局规则：'+R_NAMES[ri]+'</div>';}
 else sm+='<div style="margin-top:8px;color:#94a3b8;">第5局：普通对战</div>';
 sm+='<div style="margin-top:12px;"><button class="btn btn-gold" onclick="goG5()">⚔️ 进入第5局</button></div></div></div>';
 document.getElementById('mainArea').innerHTML=sm;
}

function goG5(){
 G.cur=4;G.phase='draw';G.A.pk=[];G.B.pk=[];
 if(G.A.fi) G.A.pk.push(G.A.fi);
 if(G.B.fi) G.B.pk.push(G.B.fi);
 ren();tabUpd();
}

// ═══ UI ═══
function sw(i){
 if(i<G.cur) return; // can't go back
}

function tabUpd(){
 var ts=document.querySelectorAll('.game-tab');
 ts.forEach(function(t,i){
 t.classList.remove('active','played');
 if(i===G.cur) t.classList.add('active');
 else if(i<G.cur) t.classList.add('played');
 });
 scUpd();
}
function scUpd(){
 document.getElementById('scoreBar').innerHTML=
 '<div class="score-box"><div class="sb-label" style="color:#818cf8;">🔵 蓝方</div><div class="sb-val" style="color:#818cf8;">'+G.A.g+'</div><div class="sb-gold">💰 '+G.A.g+'金</div></div>'+
 '<div class="score-box"><div class="sb-label">第</div><div class="sb-val">'+(G.cur+1)+'</div><div class="sb-label">/ 5 场</div></div>'+
 '<div class="score-box"><div class="sb-label" style="color:#f472b6;">🔴 红方</div><div class="sb-val" style="color:#f472b6;">'+G.B.g+'</div><div class="sb-gold">💰 '+G.B.g+'金</div></div>';
}

// ═══ INIT ═══
console.log('F_HIGH factions:', F_HIGH.map(function(f){return f.name;}));
console.log('F_MID factions:', F_MID.map(function(f){return f.name;}));
console.log('F_LOW factions:', F_LOW.map(function(f){return f.name;}));
res();
</script>
