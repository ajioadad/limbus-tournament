function getPool(id) {
  if(SI.indexOf(id)!==-1) return 's';
  if(WI.indexOf(id)!==-1) return 'w';
  return 'm';
}
function poolName(p){
  return {s:'强力池',m:'中等池',w:'弱池'}[p];
}

// Mulberry32 PRNG
function rng(seed){
  var s = seed|0;
  return function(){
    s|=0; s=s+0x6D2B79F5|0;
    var t=Math.imul(s^s>>>15,1|s);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

function shuffle(a, r){
  var arr=a.slice(), i=arr.length, j, t;
  while(i){j=Math.floor(r()*i--); t=arr[i]; arr[i]=arr[j]; arr[j]=t;}
  return arr;
}
function sample(arr, n, r){
  return shuffle(arr, r).slice(0,n);
}

// ═══════════ STATE ═══════════
var S = { seed:0, you:{s:[],m:[],w:[]}, friend:{s:[],m:[],w:[]}, swaps:{you:[],friend:[]} };

function getCounts(){
  var cs = parseInt(document.getElementById('cntS').value) || 0;
  var cm = parseInt(document.getElementById('cntM').value) || 0;
  var cw = parseInt(document.getElementById('cntW').value) || 0;
  return {s:cs, m:cm, w:cw};
}

function doDraw(seed, counts){
  var r=rng(seed), rf=rng(seed+9999);
  return {
    you:{s:sample(SI,counts.s,r), m:sample(MI,counts.m,r), w:sample(WI,counts.w,r)},
    friend:{s:sample(SI,counts.s,rf), m:sample(MI,counts.m,rf), w:sample(WI,counts.w,rf)}
  };
}

function draw(){
  var counts = getCounts();
  if(counts.s+counts.m+counts.w === 0){
    toast('⚠️ 至少选一个池子抽1人'); return;
  }
  var seed = Math.floor(Math.random()*99999999);
  var r=doDraw(seed, counts);
  S.seed=seed; S.you=r.you; S.friend=r.friend; S.swaps={you:[],friend:[]};
  G_dice.rolled=false;
  render();
  document.getElementById('diceArea').style.display='flex';
  document.getElementById('diceBtn').style.display='inline-block';
  document.getElementById('diceResult').style.display='none';
  toast('🎲 抽卡完成！掷骰子决定手操权！');
}

function swap(player, pool, oldIdStr){
  var oldId = parseInt(oldIdStr);
  var poolIds = pool==='s'?SI: pool==='m'?MI:WI;
  var avail = poolIds.filter(function(id){return id!==oldId;});
  var swapSeed = S.seed + 7777 + S.swaps[player].length * 131;
  var rr = rng(swapSeed);
  var newId = sample(avail,1,rr)[0];
  S[player][pool] = S[player][pool].map(function(id){return id===oldId?newId:id;});
  S.swaps[player].push({oldId:oldId,newId:newId});
  render();
  toast('🔁 交换: '+P[oldId]+' → '+P[newId]);
}

function resetAll(){
  S.you={s:[],m:[],w:[]}; S.friend={s:[],m:[],w:[]}; S.swaps={you:[],friend:[]};
  document.getElementById('diceArea').style.display='none';
  render(); toast('🔄 已重置');
}

  var dB = Math.floor(Math.random()*6)+1;
  G_dice.A=dA; G_dice.B=dB; G_dice.rolled=true;
  
  document.getElementById('diceA').textContent=DICE_FACES[dA-1];
  document.getElementById('diceB').textContent=DICE_FACES[dB-1];
  document.getElementById('diceA').className='dice-value'+(dA>=dB?' dice-winner':'');
  document.getElementById('diceB').className='dice-value'+(dB>=dA?' dice-winner':'');
  document.getElementById('diceResult').style.display='block';
  document.getElementById('diceBtn').style.display='none';
  
  if(dA===dB){
    document.getElementById('diceWinner').textContent='🤝 平局！重新掷骰子';
    setTimeout(function(){
      document.getElementById('diceBtn').style.display='inline-block';
      document.getElementById('diceResult').style.display='none';
    },1200);
  } else {
    var winner = dA>dB ? '🔵 蓝方' : '🔴 红方';
    document.getElementById('diceWinner').textContent='🏆 '+winner+' 获得手操权！';
  }
}

// ═══════════ RENDER ═══════════
function render(){
  var c=document.getElementById('players');
  var ps=[
    {k:'you',l:'🔵 蓝方',cls:'pc-you'},
    {k:'friend',l:'🔴 红方',cls:'pc-friend'}
  ];
  var h='';
  for(var pi=0;pi<ps.length;pi++){
    var p=ps[pi], d=S[p.k];
    var has = d.s.length + d.m.length + d.w.length > 0;
    h+='<div class="player-card '+p.cls+'">';
    h+='<div class="ph"><span class="pn">'+p.l+'</span>';
    h+='</div><div class="pb">';
    if(!has){
      h+='<div class="empty-msg">点击上方「抽卡」开始</div>';
    } else {

      var ss = d.s.length ? '🟢 强力池 ×'+d.s.length : '';
      var ms = d.m.length ? '🟡 中等池 ×'+d.m.length : '';
      var ws = d.w.length ? '🔴 弱池 ×'+d.w.length : '';
      if(ss) h+=renderGroup('s',ss,d.s,p.k);
      if(ms) h+=renderGroup('m',ms,d.m,p.k);
      if(ws) h+=renderGroup('w',ws,d.w,p.k);
    }
    h+='</div></div>';
  }
  c.innerHTML=h;

  // Update pool counts
  clearCounts();
}

function renderGroup(pool, title, ids, player){
  var h='<div class="sg"><div class="sgt">'+title+'</div>';
  for(var i=0;i<ids.length;i++){
    var id=ids[i], nm=P[id]||'未知('+id+')';
    var cls={s:'ss',m:'ms',w:'ws'}[pool];
    var badge='';
    h+='<div class="slot '+cls+'" onclick="swap(\''+player+'\',\''+pool+'\',\''+id+'\')">';
    h+='<span class="pi"></span>';
    h+='<span class="id-badge" onclick="event.stopPropagation();copyId('+id+')">'+id+'</span>';
    h+='<img class="sprite" src="assets/'+id+'.png" alt="" loading="lazy">';
    h+='<span class="name">'+nm+'</span>';
    h+=badge;
    h+='';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function clearCounts(){
  document.getElementById('sc').textContent=SI.length;
  document.getElementById('mc').textContent=MI.length;
  document.getElementById('wc').textContent=WI.length;
}

// ═══════════ TOAST ═══════════
var tt=null;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show';
  clearTimeout(tt);
  tt=setTimeout(function(){el.className='toast';},2500);
}

// ═══════════ POOL REF ═══════════
function initPoolRef(){
  var c=document.getElementById('prc');
  var pools=[
    {ids:SI, name:'🟢 强力池 ('+SI.length+'人)'},
    {ids:MI, name:'🟡 中等池 ('+MI.length+'人)'},
    {ids:WI, name:'🔴 弱池 ('+WI.length+'人)'},
  ];
  var h='';
  for(var pi=0;pi<pools.length;pi++){
    var po=pools[pi];
    h+='<div><div class="pl-title">'+po.name+'</div><div class="pl">';
    for(var i=0;i<po.ids.length;i++){
      h+='<div class="e"><span class="pid">'+po.ids[i]+'</span>'+P[po.ids[i]]+'</div>';
    }
    h+='</div></div>';
  }
  c.innerHTML=h;
}

// ═══════════ CLIPBOARD ═══════════
function copyId(id){
  navigator.clipboard.writeText(String(id)).then(function(){
    toast('📋 已复制 ID: '+id);
  }).catch(function(){
    toast('❌ 复制失败');
  });
}

// ═══════════ INIT ═══════════
initPoolRef();
render();
</script>
</body>
</html>
