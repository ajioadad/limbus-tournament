<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦗 边狱巴士 · 斗蛐蛐</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: #0a0f1a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #818cf8, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.header .sub {
  font-size: 14px;
  color: #64748b;
}

.modes {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.mode-card {
  width: 280px;
  padding: 32px 24px;
  border-radius: 18px;
  background: #141b2d;
  border: 1px solid #1e293b;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: #e2e8f0;
}
.mode-card:hover {
  border-color: #818cf8;
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.mode-card .icon { font-size: 48px; margin-bottom: 16px; }
.mode-card .name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.mode-card .desc { font-size: 13px; color: #94a3b8; line-height: 1.5; }
.mode-card .tag {
  display: inline-block;
  margin-top: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.tag-exchange { background: #1e3a5f; color: #818cf8; }
.tag-faction { background: #3b1f3b; color: #f472b6; }

.footer {
  margin-top: 48px;
  font-size: 12px;
  color: #475569;
}
</style>
</head>
<body>
<div class="header">
  <h1>🦗 边狱巴士 · 斗蛐蛐</h1>
  <div class="sub">选择对战模式</div>
</div>
<div class="modes">
  <a class="mode-card" href="draw_cricket.html">
    <div class="icon">🎲</div>
    <div class="name">交换赛</div>
    <div class="desc">1v1 / 2v2<br>三池抽卡 · 点击交换<br>BO3 / BO5 系列赛</div>
    <div class="tag tag-exchange">🎲 经典模式</div>
  </a>
  <a class="mode-card" href="阵营赛.html">
    <div class="icon">🏟️</div>
    <div class="name">阵营赛</div>
    <div class="desc">禁选联盟制 · BO3<br>两轮抽阵营 · 手指支援<br>散人补员 · 蛇形选人</div>
    <div class="tag tag-faction">🏟️ 新赛制</div>
  </a>
</div>
<div class="footer">边狱巴士 · 斗蛐蛐 &copy; 2026</div>
</body>
</html>
